`You shoulder your pack — heavier now, by one RobCo regulator and two hundred lives — and turn east, toward home.

It cost you something to get it: a promise to the Brotherhood, a long road, a piece of who you were when the door first rolled open. But the part is real, and it's enough. Somewhere across the salt, a dry fountain waits to run again, an old Overseer counts the days you've been gone — and three people you'd cross a wasteland for wait with her. Dax, with his terrible jokes. Cass, with a promise about the sky. Dottie, with a rule about a lucky cap.

The wasteland didn't eat you. You learned its rules — trust earns trust, a steady spine beats a drawn gun, what you carry is who you are — and you turn back toward the dark carrying the one thing that got you across it: people worth going home to.

<span class="ok">— END OF CHAPTER ONE: THE LONG WALK HOME —</span>
You secured the regulator for Vault 27. The walk home is its own chapter — and everyone you love is at the end of it.`); }

function endOpen(){ return (
`Night comes to Drywell, and you take stock by lantern-light, Dottie's lucky cap warm in your fist.

You didn't get the regulator today — not on terms you'd accept. But you crossed the Saltpan, talked past raiders, healed a stranger, and walked into the one town that matters with your name your own. There's still the flooded RobCo facility east of town, hot with rads and thick with whatever's nested in the dark. There's still Aldous's standing offer, for the day desperation outvotes pride. There's still time — not much, but some.

Two hundred people are counting days. Three of them are Dax, Cass, and Dottie. Tomorrow you go and get them their water — one way or another, because the rule is you come home, and you intend to keep it.

<span class="ok">— END OF CHAPTER ONE: THE LONG WALK HOME —</span>
The hard road remains open. Vault 27 still thirsts, the people you love still wait, and the next chapter is yours to walk.`); }

/* =====================================================================
   ENGINE
   ===================================================================== */
const $=id=>document.getElementById(id);
const screenEl=$("screen"), proseEl=$("prose"), crumbEl=$("crumb"),
      choicesEl=$("choices"), skipHint=$("skiphint"), toastEl=$("toast");
const reduceMotion=window.matchMedia("(prefers-reduced-motion:reduce)").matches;
let typing=false, typeTimer=null, finishType=null, currentNode=null, currentNodeId=null, currentStoryId="vault73_longwalk";

function toast(msg){
  toastEl.textContent=msg; toastEl.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove("show"),2200);
}

function renderHUD(){
  $("charName").textContent = state.name;
  const hp=Math.round(state.hp/state.maxHp*10);
  $("hpMeter").innerHTML=Array.from({length:10},(_,i)=>`<i class="${i<hp?'':'off'}"></i>`).join("");
  const rd=Math.round(state.rads/10);
  const rm=$("radMeter"); rm.classList.toggle("hot",state.rads>=70);
  rm.innerHTML=Array.from({length:10},(_,i)=>`<i class="${i<rd?'':'off'}"></i>`).join("");
}

function checkVitals(){ if(state.hp<=0) return "death"; if(state.rads>=100) return "raddeath"; return null; }

/* ---- text typing ---- */
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function typeOut(html, done){
  let resolved = (typeof html==="function") ? html() : html;
  resolved = resolved.replace(/\$caps\$/g, state.caps);
  const tmp=document.createElement("div"); tmp.innerHTML=resolved;
  const plain=tmp.textContent;
  typing=true; skipHint.textContent="› tap text to skip ‹";
  finishType=()=>{ clearInterval(typeTimer); proseEl.innerHTML=resolved+'<span class="cursor"></span>';
    typing=false; skipHint.textContent=""; finishType=null; done&&done(); };
  if(reduceMotion){ finishType(); return; }
  let i=0;
  typeTimer=setInterval(()=>{
    i+=2; proseEl.innerHTML=escapeHtml(plain.slice(0,i))+'<span class="cursor"></span>';
    screenEl.scrollTop=screenEl.scrollHeight;
    if(i>=plain.length) finishType();
  }, 9);
}

/* ---- requirement evaluation ---- */
function meets(req){
  if(!req) return true;
  if(req.item && !has(req.item)) return false;
  if(req.caps!=null && state.caps < req.caps) return false;
  if(req.flag && !state.flags[req.flag]) return false;
  return true;
}
function reqLabel(c){
  if(c.check) return `[${c.check.stat} ${c.check.dc}]`;
  return "";
}

/* ---- rendering choices & loot ---- */
function renderChoices(node){
  choicesEl.innerHTML="";
  // loot first
  (node.loot||[]).forEach(l=>{
    if(state.flags["looted_"+l.id]) return;
    const it=ITEMS[l.item];
    const fits = it.cat==="pack" ? true : roomFor(l.item);
    const b=document.createElement("button");
    b.className="choice loot"+(fits?"":" locked");
    b.innerHTML=`<span class="k">+</span>${l.label}`+(fits?"":` <span class="req">[PACK FULL]</span>`);
    if(fits){
      b.addEventListener("click",()=>{
        if(it.cat==="pack"){ /* handled by onTake (setPack) */ }
        else addItem(l.item,1);
        state.flags["looted_"+l.id]=true;
        if(l.onTake) l.onTake();
        renderHUD();
        if(it.cat!=="pack") toast("ACQUIRED · "+it.name.toUpperCase());
        renderChoices(node);
      });
    } else b.disabled=true;
    choicesEl.appendChild(b);
  });

  if(!node.choices || node.choices.length===0){
    addBtn("↻","Wake another dweller. (Restart)", ()=>start(), "restart");
    return;
  }

  node.choices.forEach(c=>{
    // visibility gating
    if(c.hideUnless && !state.flags[c.hideUnless]) return;
    if(c.hideUnless_not && state.flags[c.hideUnless_not]) return;

    const statOk = !c.check || state.sp[c.check.stat] >= c.check.dc;
    const reqOk  = meets(c.need);
    const ok = statOk && reqOk;
    const reqTxt = reqLabel(c);

    if(ok){
      // strip leading [STAT n] duplicate if it's already in label? keep label as-is.
      addBtn(c.key, c.label, ()=>navigate(c));
    } else {
      // locked
      let lab = c.lockedLabel || c.label;
      const b=addBtn(c.key, lab, null, "locked");
      // append reason
      if(c.check && !statOk){
        b.innerHTML += ` <span class="req">— need ${c.check.stat} ${c.check.dc}</span>`;
      }
      b.disabled=true;
    }
  });
}

function addBtn(key,label,fn,cls){
  const b=document.createElement("button");
  b.className="choice"+(cls?(" "+cls):"");
  b.innerHTML=`<span class="k">${key}</span>${label}`;
  if(fn) b.addEventListener("click",fn);
  choicesEl.appendChild(b);
  return b;
}

function navigate(c){
  if(c.restart){ start(); return; }
  // capture the page we're leaving (read-only journal of the last 5 scenes)
  if(currentNode && currentNodeId && !TERMINAL[currentNodeId]){
    const rawText = (typeof currentNode.text==="function") ? currentNode.text() : currentNode.text;
    const rawLabel = (typeof c.label==="string") ? c.label : "";
    state.history = (state.history||[]).concat([{
      node: currentNodeId,
      crumb: currentNode.crumb || "",
      text: rawText,
      choice: rawLabel
    }]).slice(-5);
  }
  if(c.effect) c.effect();
  if(c.give) c.give.forEach(g=>addItem(g[0],g[1]||1));
  const dest = (typeof c.to==="function") ? c.to() : c.to;
  const fatal=checkVitals();
  render(fatal || dest);
}

const TERMINAL={death:1, raddeath:1, ending_hub:1};
function render(id){
  const node=NODES[id]; currentNode=node; currentNodeId=id;
  if(NODE_STORY[id]) currentStoryId=NODE_STORY[id];
  // run node-level effect once per entry to this node
  if(node.effect && !state.flags["_e_"+id]){ state.flags["_e_"+id]=true; node.effect(); }
  // keep the Pip-Boy button correct (important after loading a save)
  $("pipOpen").disabled = false;
  renderHUD();
  crumbEl.textContent=node.crumb;
  choicesEl.innerHTML="";
  screenEl.scrollTop=0;
  // persist progress: auto-save mid-run, clear the save once a run ends
  if(TERMINAL[id]) eraseSave(); else saveGame();
  typeOut(node.text, ()=>renderChoices(node));
}

/* death nodes */
NODES.death={ crumb:"PIP-BOY · VITAL SIGNS LOST",
  text:`The wasteland does what the wasteland does.

Your legs go first, then the green light of the Pip-Boy narrows to a dot and winks out. Somewhere across the salt, a sealed door waits for a dweller who isn't coming, and an old Overseer will count ninety days and send the next one.

<span class="bad">— THE DWELLER DID NOT SURVIVE THE LONG WALK. —</span>`,
  choices:[] };
NODES.raddeath={ crumb:"PIP-BOY · LETHAL RADIATION",
  text:`The geiger counter's chatter becomes one long scream, and then, mercifully, nothing.

You sink down in the hot dust. The Saltpan glitters, beautiful and patient, and takes you the way it's taken everything else.

<span class="bad">— THE DWELLER SUCCUMBED TO RADIATION. (Mind your RADs — RadAway and Rad-X exist for a reason.) —</span>`,
  choices:[] };

/* =====================================================================
   MODULAR STORY REGISTRY
   The engine above never needs to change. A "story" is a continuous saga
   (e.g. Vault 27). It's built from one or more chapters. Each chapter is a
   self-contained module of nodes (+ optional items) that plugs in here.
     • Same storyId  = same continuous save (Chapter 1 → 2 → 3...).
     • New storyId   = a separate story with its own save slot.
   ===================================================================== */
const STORIES=[];          // registered chapter modules (metadata)
const NODE_STORY={};        // nodeId -> storyId, so the engine knows where you are
function registerChapter(c){
  if(c.items) Object.assign(ITEMS, c.items);     // merge chapter items into the shared DB
  if(c.nodes) Object.assign(NODES, c.nodes);     // merge chapter scenes into the runtime map
  const ids = c.nodes ? Object.keys(c.nodes) : (c.nodeIds||[]);
  ids.forEach(id=>{ if(!NODE_STORY[id]) NODE_STORY[id]=c.storyId; });
  STORIES.push({ storyId:c.storyId, chapter:c.chapter||1, title:c.title||c.storyId,
                 start:c.start, order:(c.order!=null?c.order:STORIES.length) });
}
const storyOf = id => NODE_STORY[id] || DEFAULT_STORY;
const startOf = storyId => { const s=STORIES.find(x=>x.storyId===storyId); return s?s.start:"intro"; };

const DEFAULT_STORY = "vault73_longwalk";
/* Chapter One claims every scene already defined above. */
registerChapter({
  storyId: DEFAULT_STORY, chapter:1, title:"Vault 27: The Long Walk Home",
  start:"intro", nodeIds:Object.keys(NODES)
});

/* ---------------------------------------------------------------------
   HOW TO ADD A CHAPTER (or a whole new story) — copy this pattern:

   registerChapter({
     storyId: "vault73_longwalk",   // same id keeps one continuous save
     chapter: 2,
     title:   "Vault 27: The Long Walk Home",
     start:   "ch2_intro",
     items: {                        // optional: new gear this chapter introduces
       laser_pistol:{name:"Laser Pistol",cat:"weapon",kind:"gun",dmg:26,ammo:"ammo_ec",size:2,desc:"..."},
     },
     nodes: {                        // the new scenes
       ch2_intro:{ crumb:"...", text:`...`, choices:[ {key:"1",label:"...",to:"ch2_next"} ] },
       // ...
     }
   });
   Then point Chapter One onward — e.g. give an ending choice { to:"ch2_intro" }.
   For a brand-new, unrelated story, use a fresh storyId (e.g. "vault12_echoes")
   and it gets its own save slot automatically.
   --------------------------------------------------------------------- */

let activeTab="stat";
function openPip(){
  pip.classList.add("open"); pip.setAttribute("aria-hidden","false"); renderPip();
}
function closePip(){ pip.classList.remove("open"); pip.setAttribute("aria-hidden","true"); }
$("pipOpen").addEventListener("click",openPip);
$("pipClose").addEventListener("click",closePip);
document.querySelectorAll(".pip-tab").forEach(t=>t.addEventListener("click",()=>{
  activeTab=t.dataset.tab;
  document.querySelectorAll(".pip-tab").forEach(x=>x.classList.toggle("active",x===t));
  renderPip();
}));

function renderPip(){
  if(activeTab==="stat") renderStat();
  else if(activeTab==="inv") renderInv();
  else if(activeTab==="opts") renderOpts();
  else renderData();
}

function renderStat(){
  if(!state.flags.hasPipboy){
    pipBody.innerHTML=`<div class="empty" style="padding:16px 8px;font-size:14px;line-height:1.7">Your Pip-Boy 3000 boots up when Overseer Wynn issues it at the vault door. Your vitals and S.P.E.C.I.A.L. appear here then — shaped by the choices of your last day in the vault.<br><br>Your save and transfer tools are ready now under <b style="color:var(--green)">DATA</b>.</div>`;
    return;
  }
  const s=state;
  const def = s.wornApparel?ITEMS[s.wornApparel].def:0;
  const wn = s.equippedWeapon?ITEMS[s.equippedWeapon].name:"Unarmed";
  const wd = weaponDmg();
  let html=`
    <div class="stat-row"><span class="nm">Identity</span><span class="vl">${s.name}</span></div>
    <div class="stat-row"><span class="nm">Health</span><span class="vl">${Math.round(s.hp)} / ${s.maxHp}</span></div>
    <div class="stat-row"><span class="nm">Radiation</span><span class="vl">${s.rads}</span></div>
    <div class="stat-row"><span class="nm">Caps</span><span class="vl" style="color:var(--warn)">${s.caps}</span></div>
    <div class="stat-row"><span class="nm">Equipped weapon</span><span class="vl">${wn} · ${wd} dmg</span></div>
    <div class="stat-row"><span class="nm">Worn armor</span><span class="vl">${s.wornApparel?ITEMS[s.wornApparel].name:"—"} · ${def} def</span></div>
    <div class="secthead">S.P.E.C.I.A.L.</div>
    <div class="special-grid">`;
  for(const k of ["S","P","E","C","I","A","L"]){
    html+=`<div class="sp"><div class="l">${k}</div><div class="n">${s.sp[k]}</div></div>`;
  }
  html+=`</div><div style="font-size:12.5px;color:var(--dim);margin-top:6px;line-height:1.5">`;
  html+=Object.keys(SPECIAL_NAMES).map(k=>`${k} · ${SPECIAL_NAMES[k]}`).join("&nbsp;&nbsp;");
  html+=`</div>`;
  pipBody.innerHTML=html;
}

function renderInv(){
  if(!state.flags.hasPipboy){
    pipBody.innerHTML=`<div class="empty" style="padding:16px 8px;font-size:14px;line-height:1.7">No pack yet. Your Pip-Boy starts tracking your gear once you're issued it and a field pack at the vault door.<br><br>Save and transfer tools are under <b style="color:var(--green)">DATA</b>.</div>`;
    return;
  }
  const cap=capCount(), used=usedSlots();
  let html="";
  if(!state.pack || !ITEMS[state.pack]){
    html+=`<div class="packline">NO PACK — POCKETS ONLY</div>`;
  } else {
    html+=`<div class="packline">${ITEMS[state.pack].name.toUpperCase()}</div>`;
  }
  html+=`<div style="font-size:13px;color:var(--dim);margin-bottom:2px">CARRY ${used} / ${cap} slots</div>`;
  html+=`<div class="capbar">`+Array.from({length:Math.max(cap,2)},(_,i)=>`<i class="${i<used?'':'off'}"></i>`).join("")+`</div>`;
  html+=`<div class="cap-line">⛁ ${state.caps} caps</div>`;

  const cats=[["weapon","Weapons"],["apparel","Apparel"],["aid","Aid"],["food","Food & Drink"],["ammo","Ammo"],["misc","Keepsakes"],["pack","Packs"]];
  for(const [cat,label] of cats){
    const ids=Object.keys(state.inv).filter(id=>state.inv[id]>0 && ITEMS[id] && ITEMS[id].cat===cat);
    if(cat==="pack"){ // only show active pack
      if(!state.pack) continue;
    }
    if(ids.length===0) continue;
    html+=`<div class="invcat"><h4>${label}</h4>`;
    ids.forEach(id=>{
      const it=ITEMS[id], q=state.inv[id];
      const eqW = id===state.equippedWeapon, eqA = id===state.wornApparel, eqP = id===state.pack;
      html+=`<div class="item">
        <span class="iname">${it.name}${(eqW||eqA||eqP)?` <span class="eqd">[${eqW?'EQUIPPED':eqA?'WORN':'IN USE'}]</span>`:""}
          <small>${it.desc||""}</small></span>`;
      if(cat==="ammo"||q>1) html+=`<span class="qty">x${q}</span>`;
      // actions
      html+=`<span style="display:flex;gap:5px">`;
      if(it.use) html+=`<button class="iact" data-act="use" data-id="${id}">USE</button>`;
      if(cat==="weapon" && !eqW) html+=`<button class="iact" data-act="equip" data-id="${id}">EQUIP</button>`;
      if(cat==="apparel" && !eqA) html+=`<button class="iact" data-act="wear" data-id="${id}">WEAR</button>`;
      if(!eqP && cat!=="ammo") html+=`<button class="iact" data-act="drop" data-id="${id}">DROP</button>`;
      html+=`</span></div>`;
    });
    html+=`</div>`;
  }
  if(Object.keys(state.inv).filter(id=>state.inv[id]>0 && ITEMS[id].cat!=="pack").length===0 && !state.pack){
    html+=`<div class="empty">Your pockets are nearly empty. Find a pack out in the wasteland to carry more.</div>`;
  }
  pipBody.innerHTML=html;
  pipBody.querySelectorAll(".iact").forEach(b=>b.addEventListener("click",()=>{
    const id=b.dataset.id, act=b.dataset.act;
    if(act==="use"){ useItem(id); toast("USED · "+ITEMS[id].name.toUpperCase()); }
    else if(act==="equip"){ state.equippedWeapon=id; toast("EQUIPPED · "+ITEMS[id].name.toUpperCase()); }
    else if(act==="wear"){ state.wornApparel=id; toast("WORN · "+ITEMS[id].name.toUpperCase()); }
    else if(act==="drop"){ removeItem(id,1); toast("DROPPED · "+ITEMS[id].name.toUpperCase()); }
    renderHUD(); renderInv();
  }));
}

/* shared helper: builds a collapsible section, auto-expands the first time */
const _collapsed={};
function pipSection(id, label, bodyHtml, defaultOpen=true){
  const open = _collapsed[id]===undefined ? defaultOpen : !_collapsed[id];
  return `<div class="pip-section">
    <div class="pip-section-hdr${open?'':' collapsed'}" data-sec="${id}">
      ${label}<span class="caret">▾</span>
    </div>
    <div class="pip-section-body${open?'':' collapsed'}" id="sec-${id}" style="max-height:${open?'2000px':'0'}">
      <div style="padding:6px 0 4px">${bodyHtml}</div>
    </div>
  </div>`;
}
function wireCollapsibles(){
  pipBody.querySelectorAll(".pip-section-hdr").forEach(hdr=>{
    hdr.addEventListener("click",()=>{
      const id=hdr.dataset.sec, body=document.getElementById("sec-"+id);
      const closing=!hdr.classList.contains("collapsed");
      hdr.classList.toggle("collapsed", closing);
      body.classList.toggle("collapsed", closing);
      body.style.maxHeight = closing ? "0" : "2000px";
      _collapsed[id]=closing;
    });
  });
}

function renderData(){
  let html="";

  /* ---- Pages You've Read: read-only journal of the last 5 scenes ---- */
  const hist = state.history || [];
  let histBody;
  if(hist.length===0){
    histBody = `<div class="empty">Your last few pages will appear here as you read on.</div>`;
  } else {
    histBody = `<div style="font-size:12.5px;color:var(--dim);font-style:italic;margin-bottom:6px">A record of the last ${hist.length} page${hist.length===1?"":"s"} and the choice${hist.length===1?"":"s"} you made. Read-only — your decisions stand.</div>`;
    // newest at the top
    for(let i=hist.length-1; i>=0; i--){
      const h=hist[i];
      const pageNo = hist.length - i;
      histBody += `<div style="border:1px solid var(--line);border-radius:6px;padding:9px 11px;margin:8px 0;background:rgba(54,255,126,.03)">
        <div style="font-family:'VT323',monospace;font-size:16px;color:var(--dim);letter-spacing:1.5px;margin-bottom:5px">
          ‹ ${pageNo===1?"PREVIOUS PAGE":"PAGE −"+(pageNo-1)} · ${escapeHtml(h.crumb||"")}
        </div>
        <div style="font-size:13.5px;line-height:1.65;color:var(--green);white-space:pre-wrap;margin-bottom:7px">${h.text||""}</div>
        ${h.choice ? `<div style="font-family:'VT323',monospace;font-size:16px;color:var(--warn);border-top:1px dotted var(--line);padding-top:6px;letter-spacing:.4px">
          ➤ Your choice: <span style="color:var(--bright)">${escapeHtml(h.choice)}</span>
        </div>` : ""}
      </div>`;
    }
  }
  html += pipSection("history","Pages You've Read", histBody, true);

  const anyBond = state.bonds && (state.bonds.robin||state.bonds.cass||state.bonds.sam);
  if(anyBond){
    const tie=(name,who,line)=>{
      const b=state.bonds[who]||0;
      const hearts = b>=5?"●●●":b>=3?"●●○":b>=1?"●○○":"○○○";
      return `<div class="logentry"><b>${name}</b> &nbsp;<span style="color:var(--warn)">${hearts}</span><br><span style="color:var(--dim)">${line}</span></div>`;
    };
    const bonds =
      tie("Dax","robin","Your best friend since the nursery. Borrowed you a 10mm and a promise to drag you home.")+
      tie("Cassara","cass","The one you love — Cass, to you. Hydroponics dreamer, waiting under a painted sky for the real one.")+
      tie("Dottie","sam","Your kid sister. Lent you her lucky cap. The rule is you bring it back.");
    html+=pipSection("bonds","The People You Carry", bonds, true);
  }
  const logBody = state.log.length===0
    ? `<div class="empty">No entries yet. Your story is just beginning.</div>`
    : state.log.map(e=>`<div class="logentry">› ${e}</div>`).join("");
  html+=pipSection("log","Quest Log & Journal", logBody, true);

  pipBody.innerHTML=html;
  wireCollapsibles();
}

  const ms=document.getElementById("manualSave");
  if(ms) ms.addEventListener("click", async ()=>{ const ok=await saveGame(); toast(ok?(cloud.user?"SAVED · SYNCED":"PROGRESS SAVED"):"SAVE UNAVAILABLE HERE"); });
  const eb=document.getElementById("eraseBtn");
  if(eb) eb.addEventListener("click", async ()=>{ await eraseSave(); closePip(); start(); });

  const box=document.getElementById("codeBox"), impRow=document.getElementById("impRow");
  const exp=document.getElementById("expBtn"), imp=document.getElementById("impBtn"), impL=document.getElementById("impLoad");
  if(exp) exp.addEventListener("click", ()=>{
    const code=makeSaveCode();
    if(!code){ toast("NOTHING TO EXPORT YET"); return; }
    box.style.display="block"; impRow.style.display="none"; box.readOnly=true; box.value=code;
    box.focus(); box.select();
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(code).then(()=>toast("CODE COPIED")).catch(()=>toast("CODE READY — SELECT & COPY")); }
    else toast("CODE READY — SELECT & COPY");
  });
  if(imp) imp.addEventListener("click", ()=>{
    box.style.display="block"; box.readOnly=false; box.value=""; box.placeholder="Paste your save code here, then press Load.";
    impRow.style.display="block"; box.focus();
  });
  if(impL) impL.addEventListener("click", ()=>{
    const parsed=readSaveCode(box.value);
    if(parsed&&parsed.state&&parsed.node){ resumeGame(parsed); toast("SAVE CODE LOADED"); }
    else toast("THAT CODE DIDN'T READ — CHECK IT COPIED IN FULL");
  });
}

document.addEventListener("keydown",e=>{

/* ====================================================================
   SAVE / LOAD  —  layered:
     1) CLOUD (Firebase, optional) — syncs across devices when signed in
     2) window.storage (Claude.ai artifact) — persists inside Claude
     3) localStorage (your hosted site) — per-device fallback
   ==================================================================== */

/* ↓↓↓ PASTE YOUR FIREBASE CONFIG HERE to turn on cross-device cloud saves.
   Leave apiKey as "" to run with local saves only. (Setup steps are in the
   chat where this was built.) The values below come from your Firebase
   project settings → "Your apps" → SDK setup & configuration. */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDmJzpLiE5bJoLbkApxv51zK_9mv1yoLpU",
  authDomain: "wastelandtales-8de50.firebaseapp.com",
  projectId: "wastelandtales-8de50",
  appId: "1:109486630815:web:fbeab5a641bc9c747dffaa"
};
const FB_VERSION = "12.14.0";

const cloud = { enabled:false, user:null, db:null, auth:null, api:null };

async function initCloud(){
  if(!FIREBASE_CONFIG.apiKey) return;            // not configured → skip, use local
  try{
    const [appMod, authMod, fsMod] = await Promise.all([
      import(`https://www.gstatic.com/firebasejs/${FB_VERSION}/firebase-app.js`),
      import(`https://www.gstatic.com/firebasejs/${FB_VERSION}/firebase-auth.js`),
      import(`https://www.gstatic.com/firebasejs/${FB_VERSION}/firebase-firestore.js`),
    ]);
    const app = appMod.initializeApp(FIREBASE_CONFIG);
    cloud.auth = authMod.getAuth(app);
    cloud.db   = fsMod.getFirestore(app);
    cloud.api  = Object.assign({}, authMod, fsMod);
    cloud.enabled = true;
    await new Promise(res=>{
      let first=true;
      authMod.onAuthStateChanged(cloud.auth, u=>{ cloud.user=u||null; updateCloudUI(); if(first){first=false;res();} });
    });
  }catch(e){ cloud.enabled=false; }              // blocked (e.g. inside Claude) → local only
}
function authErr(e){
  const m=(e&&e.code||"").split("/")[1]||"";
  if(m.includes("email-already")) return "EMAIL ALREADY REGISTERED — TRY SIGN IN";
  if(m.includes("invalid-email")) return "INVALID EMAIL";
  if(m.includes("weak-password")) return "PASSWORD TOO SHORT (MIN 6)";
  if(m.includes("invalid-credential")||m.includes("wrong-password")||m.includes("user-not-found")) return "EMAIL OR PASSWORD INCORRECT";
  return "SIGN-IN ERROR — CHECK CONNECTION";
}
async function cloudSave(payload){
  if(!cloud.user) return false;
  try{
    await cloud.api.setDoc(cloud.api.doc(cloud.db,"saves",cloud.user.uid),
      { ["s_"+payload.story]: JSON.stringify(payload), active: payload.story, updated:Date.now() },
      { merge:true });
    return true;
  }catch(e){ return false; }
}
async function cloudLoad(storyId){
  if(!cloud.user) return null;
  try{
    const s=await cloud.api.getDoc(cloud.api.doc(cloud.db,"saves",cloud.user.uid));
    if(!s.exists()) return null;
    const d=s.data();
    const sid = storyId || d.active || DEFAULT_STORY;
    const raw = d["s_"+sid];
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

/* ---- local store (window.storage in Claude, else localStorage); per-story slots ---- */
const SAVE_PREFIX="vault73_save_";
const ACTIVE_KEY="vault73_active";
const inClaude = (typeof window!=="undefined" && window.storage);
function lput(key,val){ try{ if(inClaude){ window.storage.set(key,val,false).catch(()=>{}); } else localStorage.setItem(key,val); }catch(e){} }
async function lget(key){ try{ if(inClaude){ const r=await window.storage.get(key,false); return (r&&r.value)?r.value:null; } return localStorage.getItem(key); }catch(e){ return null; } }
function ldel(key){ try{ if(inClaude){ window.storage.delete(key,false).catch(()=>{}); } else localStorage.removeItem(key); }catch(e){} }

function localPut(payload){ lput(SAVE_PREFIX+payload.story, JSON.stringify(payload)); lput(ACTIVE_KEY, payload.story); }
async function localGet(storyId){
  const sid = storyId || (await lget(ACTIVE_KEY)) || DEFAULT_STORY;
  const v = await lget(SAVE_PREFIX+sid);
  try{ return v?JSON.parse(v):null; }catch(e){ return null; }
}
function localClear(storyId){ ldel(SAVE_PREFIX+(storyId||currentStoryId)); }

/* ---- migration: keeps older saves loading as new chapters/fields arrive ---- */
function migrate(saved){
  if(!saved || !saved.state) return saved;
  const fresh = freshState();
  const st = Object.assign({}, fresh, saved.state);        // fill any new top-level fields with defaults
  st.sp = Object.assign({}, fresh.sp, saved.state.sp||{}); // ensure every S.P.E.C.I.A.L. key exists
  st.bonds = Object.assign({}, fresh.bonds, saved.state.bonds||{});
  st.inv = saved.state.inv || {};
  st.flags = saved.state.flags || {};
  st.log = saved.state.log || [];
  st.history = saved.state.history || [];
  st.dwellerName = saved.state.dwellerName || "Diego";
  return { v:2, story: saved.story || DEFAULT_STORY, node: saved.node, state: st, erased: saved.erased };
}

/* ---- unified API used by the game ---- */
async function saveGame(){
  const payload={ v:2, story:currentStoryId, node:currentNodeId, state };
  localPut(payload);
  if(cloud.user) cloudSave(payload);
  return true;
}
async function loadGame(){
  if(cloud.user){ const c=await cloudLoad(); if(c) return migrate(c); }
  const l=await localGet(); return l?migrate(l):null;
}
function makeSaveCode(){
  try{ return "V73-"+btoa(unescape(encodeURIComponent(JSON.stringify({v:2,story:currentStoryId,node:currentNodeId,state})))); }
  catch(e){ return ""; }
}
function readSaveCode(code){
  try{ return migrate(JSON.parse(decodeURIComponent(escape(atob(String(code).replace(/^V73-/,"").replace(/\s+/g,"")))))); }
  catch(e){ return null; }
}

async function eraseSave(){
  localClear(currentStoryId);
  if(cloud.user) cloudSave({v:2,story:currentStoryId,node:"intro",state:freshState(),erased:true});
}

function resumeGame(saved){
  saved = migrate(saved);
  state = saved.state;
  currentStoryId = saved.story || DEFAULT_STORY;
  closePip();
  render(saved.node && NODES[saved.node] ? saved.node : startOf(currentStoryId));
}

function showContinuePrompt(saved){
  saved = migrate(saved);
  state = saved.state;
  currentStoryId = saved.story || DEFAULT_STORY;
  currentNodeId = saved.node;
  $("pipOpen").disabled = false;
  renderHUD();
  closePip();
  currentNode=null;
  crumbEl.textContent="VAULT 27 · PIP-BOY · SAVED RECORD";
  const place = (NODES[saved.node]&&NODES[saved.node].crumb) ? NODES[saved.node].crumb : "the wasteland";
  const src = cloud.user ? "synced from the cloud" : "held on this device";
  proseEl.innerHTML =
    `The Pip-Boy wakes with a record already in its memory — your last walk, ${src}.\n\n`+
    `<span class="ok">SAVED RUN — ${escapeHtml(state.name||"DWELLER")}</span>\n`+
    `HP ${Math.round(state.hp)}/${state.maxHp}   ·   RAD ${state.rads}   ·   ${state.caps} caps\n`+
    `Last seen: ${escapeHtml(place)}\n\n`+
    `Pick up where you left off, or wake a new dweller and start the long walk over?`+
    `<span class="cursor"></span>`;
  skipHint.textContent="";
  choicesEl.innerHTML="";
  addBtn("1","Continue your walk.", ()=>resumeGame(saved));
  addBtn("2","Wake a new dweller. (Erases this saved run)", async ()=>{ await eraseSave(); start(); }, "restart");
}

/* ---- cloud sign-in UI lives in the Pip-Boy DATA tab ---- */
function cloudStatusHTML(){
  if(!FIREBASE_CONFIG.apiKey)
    return `<div style="font-size:13px;color:var(--dim);line-height:1.6">Cloud sync isn't set up on this copy — your progress saves on this one device. To sync between your phone and computer, add a Firebase config (setup steps are in the chat).</div>`;
  if(!cloud.enabled)
    return `<div style="font-size:13px;color:var(--dim);line-height:1.6">Cloud sync is configured but can't run here (this environment blocks it). It will work on your hosted site. Saving locally for now.</div>`;
  if(!cloud.user)
    return `<div style="font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:7px">Sign in to sync this run across devices. New here? Create an account — it's just a tag for your save.</div>
      <input id="cEmail" type="email" placeholder="email" autocomplete="username"
        style="width:100%;margin-bottom:6px;background:rgba(54,255,126,.06);border:1px solid var(--dim);color:var(--bright);font-family:'JetBrains Mono',monospace;font-size:14px;padding:7px 9px;border-radius:5px">

        <button class="iact" id="cSignin">SIGN IN</button>

      </div>`;
  return `<div style="font-size:13.5px;color:var(--green);margin-bottom:7px">☁ Synced — signed in as <b style="color:var(--bright)">${escapeHtml(cloud.user.email||"player")}</b></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="iact" id="cPull">⬇ LOAD CLOUD SAVE</button>
        <button class="iact" id="cPush">⬆ UPLOAD THIS RUN</button>
        <button class="iact" id="cOut" style="border-color:var(--dim);color:var(--dim)">SIGN OUT</button>
      </div>`;

function wireCloudUI(){
  const g=id=>document.getElementById(id);
  const em=()=>g("cEmail")?g("cEmail").value.trim():"", pw=()=>g("cPass")?g("cPass").value:"";
  if(g("cSignin")) g("cSignin").addEventListener("click", async()=>{ try{ await cloud.api.signInWithEmailAndPassword(cloud.auth,em(),pw()); toast("SIGNED IN"); }catch(e){ toast(authErr(e)); } });
  if(g("cSignup")) g("cSignup").addEventListener("click", async()=>{ try{ await cloud.api.createUserWithEmailAndPassword(cloud.auth,em(),pw()); toast("ACCOUNT CREATED · UPLOAD YOUR RUN"); }catch(e){ toast(authErr(e)); } });
  if(g("cOut"))    g("cOut").addEventListener("click", async()=>{ try{ await cloud.api.signOut(cloud.auth); toast("SIGNED OUT"); }catch(e){} });
  if(g("cPush"))   g("cPush").addEventListener("click", async()=>{ const ok=await cloudSave({v:2,story:currentStoryId,node:currentNodeId,state}); toast(ok?"UPLOADED TO CLOUD":"UPLOAD FAILED"); });
  if(g("cPull"))   g("cPull").addEventListener("click", async()=>{ const c=await cloudLoad(); if(c&&c.state&&c.node){ resumeGame(c); toast("CLOUD SAVE LOADED"); } else toast("NO CLOUD SAVE YET"); });
}
function updateCloudUI(){ if(pip.classList.contains("open") && (activeTab==="opts"||activeTab==="data")) renderPip(); }

function start(){
  state=freshState();
  $("pipOpen").disabled=false;
  closePip();
  render("intro");
}

async function boot(){
  await initCloud();
  const saved = await loadGame();
  if(saved && saved.state && saved.node && !saved.erased && !TERMINAL[saved.node]) showContinuePrompt(saved);
  else start();
}
boot();
</script>
