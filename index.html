<!-- VAULT 27: THE LONG WALK HOME — a Fallout fan-fiction gamebook -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#02160b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wasteland Tales">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --screen:#02160b;
    --screen-edge:#010a05;
    --green:#36ff7e;
    --dim:#15994a;
    --bright:#c9ffdd;
    --warn:#ffd23b;
    --danger:#ff5a3c;
    --glow:rgba(54,255,126,.28);
    --line:rgba(54,255,126,.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#000;-webkit-text-size-adjust:100%;text-size-adjust:100%;overscroll-behavior:none;}
  body{
    font-family:"JetBrains Mono",ui-monospace,monospace;color:var(--green);
    display:flex;align-items:center;justify-content:center;padding:14px;min-height:100%;
    -webkit-font-smoothing:antialiased;
  }

  .monitor{
    width:100%;max-width:760px;height:min(88vh,820px);
    background:radial-gradient(120% 130% at 50% 38%, var(--screen) 55%, var(--screen-edge) 100%);
    border-radius:22px;padding:26px 28px 22px;position:relative;overflow:hidden;
    display:flex;flex-direction:column;
    box-shadow:0 0 0 2px rgba(54,255,126,.08),0 0 90px rgba(54,255,126,.05),
      inset 0 0 130px rgba(0,0,0,.7),inset 0 0 28px rgba(54,255,126,.05);
  }
  .monitor::before{content:"";position:absolute;inset:0;border-radius:22px;pointer-events:none;z-index:30;
    background:radial-gradient(110% 120% at 50% 50%, transparent 58%, rgba(0,0,0,.6) 100%);}
  .monitor::after{content:"";position:absolute;inset:0;border-radius:22px;pointer-events:none;z-index:31;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.16) 3px,rgba(0,0,0,0) 4px);
    animation:flicker 5.5s steps(60) infinite;mix-blend-mode:multiply;}
  @keyframes flicker{0%,100%{opacity:.55}48%{opacity:.42}49%{opacity:.6}92%{opacity:.5}93%{opacity:.62}}

  /* ---------- HUD ---------- */
  .hud{flex:none;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);padding-bottom:11px;margin-bottom:12px;
    font-family:"VT323",monospace;font-size:21px;letter-spacing:.5px;text-shadow:0 0 8px var(--glow);}
  .badge{display:flex;align-items:center;gap:7px;color:var(--bright);}
  .badge svg{filter:drop-shadow(0 0 5px var(--glow));}
  .tag{color:var(--dim);}
  .who{color:var(--bright);}
  .bar{display:flex;align-items:center;gap:7px;}
  .meter{width:88px;height:13px;border:1px solid var(--dim);padding:1px;display:flex;gap:1px;}
  .meter i{flex:1;background:var(--green);box-shadow:0 0 6px var(--glow);transition:opacity .2s;}
  .meter i.off{background:transparent;box-shadow:none;}
  .meter.rads i{background:var(--warn);}
  .meter.rads.hot i{background:var(--danger);}
  .spacer{flex:1;}
  .pip-btn{font-family:"VT323",monospace;font-size:20px;letter-spacing:1px;cursor:pointer;
    background:transparent;border:1px solid var(--dim);color:var(--green);padding:3px 12px;border-radius:5px;
    text-shadow:0 0 8px var(--glow);transition:background .12s,color .12s;}
  .pip-btn:hover,.pip-btn:focus-visible{background:rgba(54,255,126,.14);color:var(--bright);outline:none;}
  .pip-btn[disabled]{opacity:.4;cursor:not-allowed;}
  .pip-btn[disabled]:hover{background:transparent;color:var(--green);}

  /* ---------- screen ---------- */
  .screen{flex:1;overflow-y:auto;padding-right:8px;position:relative;z-index:4;text-shadow:0 0 7px var(--glow);}
  .screen::-webkit-scrollbar{width:8px;}
  .screen::-webkit-scrollbar-thumb{background:var(--dim);border-radius:8px;}
  .crumb{font-family:"VT323",monospace;font-size:18px;color:var(--dim);letter-spacing:2px;
    text-transform:uppercase;margin-bottom:10px;}
  .prose{font-size:15.5px;line-height:1.72;white-space:pre-wrap;}
  .prose .say{color:var(--bright);}
  .prose .bad{color:var(--danger);}
  .prose .ok{color:var(--warn);}
  .cursor{display:inline-block;width:9px;height:18px;margin-left:2px;background:var(--green);
    box-shadow:0 0 8px var(--glow);vertical-align:-3px;animation:blink 1.05s steps(1) infinite;}
  @keyframes blink{50%{opacity:0}}

  /* ---------- choices ---------- */
  .choices{flex:none;margin-top:12px;border-top:1px solid var(--line);padding-top:12px;position:relative;z-index:4;}
  .choice{display:block;width:100%;text-align:left;cursor:pointer;background:transparent;
    border:1px solid transparent;color:var(--green);font-family:"VT323",monospace;font-size:20px;
    letter-spacing:.4px;padding:7px 12px;margin:3px 0;line-height:1.25;border-radius:4px;
    text-shadow:0 0 8px var(--glow);transition:background .12s,border-color .12s,color .12s;}
  .choice .k{color:var(--dim);margin-right:10px;}
  .choice .req{color:var(--warn);}
  .choice:hover,.choice:focus-visible{background:rgba(54,255,126,.12);border-color:var(--dim);color:var(--bright);outline:none;}
  .choice:hover .k,.choice:focus-visible .k{color:var(--bright);}
  .choice.locked{color:var(--dim);cursor:not-allowed;text-shadow:none;}
  .choice.locked .req{color:var(--danger);}
  .choice.locked:hover{background:transparent;border-color:transparent;color:var(--dim);}
  .choice.loot{color:var(--bright);}
  .choice.loot .k{color:var(--warn);}
  .choice.restart{color:var(--warn);}
  .choice.restart .k{color:var(--warn);}
  .skiphint{font-family:"VT323",monospace;font-size:15px;color:var(--dim);text-align:right;
    margin-top:6px;letter-spacing:1px;opacity:.7;height:16px;}
  .toast{position:absolute;left:50%;bottom:74px;transform:translateX(-50%);z-index:40;
    font-family:"VT323",monospace;font-size:19px;letter-spacing:.6px;color:var(--bright);
    background:rgba(2,22,11,.92);border:1px solid var(--dim);padding:6px 16px;border-radius:6px;
    text-shadow:0 0 8px var(--glow);opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}

  /* ---------- PIP-BOY overlay ---------- */
  .pip{position:absolute;inset:0;z-index:25;background:rgba(2,18,9,.97);border-radius:22px;
    display:none;flex-direction:column;padding:24px 28px;}
  .pip.open{display:flex;}
  .pip-tabs{flex:none;display:flex;gap:6px;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:12px;
    font-family:"VT323",monospace;font-size:21px;letter-spacing:1px;}
  .pip-tab{cursor:pointer;background:transparent;border:none;color:var(--dim);padding:3px 14px;border-radius:4px;
    text-shadow:0 0 8px var(--glow);}
  .pip-tab.active{color:var(--bright);background:rgba(54,255,126,.12);}
  .pip-tab:hover{color:var(--green);}
  .pip-close{margin-left:auto;}
  .pip-body{flex:1;overflow-y:auto;padding-right:8px;text-shadow:0 0 7px var(--glow);}
  .pip-body::-webkit-scrollbar{width:8px;}
  .pip-body::-webkit-scrollbar-thumb{background:var(--dim);border-radius:8px;}

  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;
    border-bottom:1px dotted var(--line);font-size:15px;}
  .stat-row .nm{color:var(--green);}
  .stat-row .vl{color:var(--bright);font-family:"VT323",monospace;font-size:21px;}
  .special-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:14px 0 4px;}
  .sp{border:1px solid var(--dim);border-radius:5px;text-align:center;padding:7px 2px;}
  .sp .l{font-family:"VT323",monospace;font-size:22px;color:var(--bright);}
  .sp .n{font-family:"VT323",monospace;font-size:26px;color:var(--green);line-height:1;}
  .sp .full{font-size:11px;color:var(--dim);letter-spacing:.3px;}
  .secthead{font-family:"VT323",monospace;font-size:20px;color:var(--dim);letter-spacing:2px;
    text-transform:uppercase;margin:18px 0 6px;border-bottom:1px solid var(--line);padding-bottom:3px;}

  .cap-line{font-family:"VT323",monospace;font-size:19px;color:var(--warn);margin:2px 0 10px;}
  .invcat{margin-bottom:14px;}
  .invcat h4{font-family:"VT323",monospace;font-size:19px;color:var(--dim);letter-spacing:1.5px;
    text-transform:uppercase;margin:0 0 5px;}
  .item{display:flex;align-items:center;gap:10px;padding:6px 8px;border:1px solid transparent;border-radius:5px;}
  .item:hover{background:rgba(54,255,126,.07);border-color:var(--line);}
  .item .iname{flex:1;font-size:14.5px;}
  .item .iname small{display:block;color:var(--dim);font-size:12.5px;line-height:1.4;}
  .item .qty{color:var(--warn);font-family:"VT323",monospace;font-size:18px;min-width:30px;text-align:right;}
  .item .eqd{color:var(--warn);font-family:"VT323",monospace;font-size:16px;letter-spacing:1px;}
  .iact{font-family:"VT323",monospace;font-size:17px;cursor:pointer;background:transparent;
    border:1px solid var(--dim);color:var(--green);padding:1px 9px;border-radius:4px;letter-spacing:.5px;}
  .iact:hover{background:rgba(54,255,126,.14);color:var(--bright);}
  .empty{color:var(--dim);font-size:13.5px;font-style:italic;padding:4px 8px;}
  .packline{font-family:"VT323",monospace;font-size:20px;color:var(--bright);margin-bottom:4px;}
  .capbar{height:12px;border:1px solid var(--dim);display:flex;gap:1px;padding:1px;margin:4px 0 14px;}
  .capbar i{flex:1;background:var(--green);box-shadow:0 0 5px var(--glow);}
  .capbar i.off{background:transparent;box-shadow:none;}
  .logentry{font-size:14px;line-height:1.6;padding:6px 0;border-bottom:1px dotted var(--line);}
  .logentry b{color:var(--bright);font-weight:500;}

  /* ---------- collapsible sections in Pip-Boy ---------- */
  .pip-section{}
  .pip-section-hdr{
    display:flex;align-items:center;justify-content:space-between;cursor:pointer;
    font-family:"VT323",monospace;font-size:20px;color:var(--dim);letter-spacing:2px;
    text-transform:uppercase;margin:18px 0 0;border-bottom:1px solid var(--line);padding-bottom:3px;
    user-select:none;-webkit-user-select:none;touch-action:manipulation;
  }
  .pip-section-hdr:hover{color:var(--green);}
  .pip-section-hdr .caret{font-size:16px;transition:transform .18s;}
  .pip-section-hdr.collapsed .caret{transform:rotate(-90deg);}
  .pip-section-body{overflow:hidden;transition:max-height .22s ease,opacity .18s;}
  .pip-section-body.collapsed{max-height:0!important;opacity:0;pointer-events:none;}

  /* momentum scrolling on the two scroll regions */
  .screen, .pip-body{ -webkit-overflow-scrolling:touch; }
  /* kill tap-delay / accidental double-tap zoom on controls */
  .choice,.pip-btn,.pip-tab,.iact,.item .iact{ touch-action:manipulation; }

  /* ============ MOBILE: the phone becomes the Pip-Boy ============ */
  @media (max-width:640px){
    body{ padding:0; align-items:stretch; justify-content:stretch; background:var(--screen-edge); }
    .monitor{
      width:100%; max-width:none; height:100vh; height:100dvh;
      border-radius:0;
      padding:
        calc(10px + env(safe-area-inset-top)) calc(15px + env(safe-area-inset-right))
        calc(8px + env(safe-area-inset-bottom)) calc(15px + env(safe-area-inset-left));
      box-shadow:inset 0 0 120px rgba(0,0,0,.7),inset 0 0 26px rgba(54,255,126,.05);
    }
    .monitor::before,.monitor::after{ border-radius:0; }
    .pip{ border-radius:0; padding:
      calc(18px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right))
      calc(16px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left)); }

    .hud{ font-size:18px; gap:9px; padding-bottom:9px; margin-bottom:10px; }
    .meter{ width:54px; height:12px; }
    .tag{ font-size:17px; }
    .pip-btn{ font-size:18px; padding:4px 10px; }
    .crumb{ font-size:16px; }
    .prose{ font-size:16px; line-height:1.75; }

    /* roomy, obviously-tappable choices */
    .choices{ padding-top:10px; }
    .choice{ font-size:19px; padding:13px 13px; margin:5px 0; line-height:1.3; }
    .choice .k{ margin-right:12px; }

    .pip-tabs{ font-size:20px; }
    .pip-tab{ padding:6px 14px; }
    .special-grid{ grid-template-columns:repeat(4,1fr); }
    .iact{ font-size:17px; padding:6px 12px; min-height:38px; }
    .item{ flex-wrap:wrap; padding:9px 8px; }
    .item .iname{ flex:1 1 100%; margin-bottom:4px; }
    .toast{ bottom:calc(84px + env(safe-area-inset-bottom)); font-size:18px; }
  }

  /* ===== touch devices (no hover): give choices a real button look ===== */
  @media (hover:none){
    .choice{ border-color:var(--line); background:rgba(54,255,126,.05); border-radius:7px; }
    .choice .k{ color:var(--green); }
    .choice:active{ background:rgba(54,255,126,.20); border-color:var(--dim); color:var(--bright); }
    .choice.locked, .choice.locked:active{ background:transparent; border-color:transparent; }
    .pip-btn:active,.pip-tab:active,.iact:active{ background:rgba(54,255,126,.22); }
    .hud,.choices,.pip-tabs,.choice,.pip-btn,.pip-tab,.iact{ -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
    #codeBox, .prose{ -webkit-user-select:text; user-select:text; }
  }

  @media (max-width:560px){
    .special-grid{grid-template-columns:repeat(4,1fr);}
  }
  @media (prefers-reduced-motion:reduce){
    .monitor::after{animation:none;opacity:.45;}.cursor{animation:none;}
  }
</style>

<div class="monitor" role="application" aria-label="Pip-Boy interactive gamebook">
  <div class="hud" id="hud">
    <span class="badge" id="vaultBadge">
      <svg width="20" height="22" viewBox="0 0 20 22" fill="none" aria-hidden="true">
        <circle cx="10" cy="6" r="3.4" stroke="currentColor" stroke-width="1.4"/>
        <path d="M3.5 20c0-4.2 2.9-7 6.5-7s6.5 2.8 6.5 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="who" id="charName">VAULT 27</span>
    </span>
    <span class="bar"><span class="tag">HP</span><span class="meter" id="hpMeter"></span></span>
    <span class="bar"><span class="tag">RAD</span><span class="meter rads" id="radMeter"></span></span>
    <span class="spacer"></span>
    <button class="pip-btn" id="pipOpen">▸ PIP-BOY</button>
  </div>

  <div class="screen" id="screen">
    <div class="crumb" id="crumb">VAULT 27 — RECLAMATION CONTROL</div>
    <div class="prose" id="prose"></div>
  </div>

  <div class="choices" id="choices"></div>
  <div class="skiphint" id="skiphint"></div>
  <div class="toast" id="toast"></div>

  <!-- PIP-BOY -->
  <div class="pip" id="pip" aria-hidden="true">
    <div class="pip-tabs">
      <button class="pip-tab active" data-tab="stat">STAT</button>
      <button class="pip-tab" data-tab="inv">INV</button>
      <button class="pip-tab" data-tab="data">DATA</button>
      <button class="pip-tab" data-tab="opts">OPTS</button>
      <button class="pip-btn pip-close" id="pipClose">CLOSE ✕</button>
    </div>
    <div class="pip-body" id="pipBody"></div>
  </div>
</div>

<script>
/* =====================================================================
   VAULT 27: THE LONG WALK HOME
   A Fallout fan-fiction gamebook. Original characters & locations set
   within the established Fallout universe. Mojave region, year 2284.
   ===================================================================== */

/* ---------------------- ITEM DATABASE ---------------------- */
const ITEMS = {
  // apparel
  vaultsuit:{name:"Vault 27 Jumpsuit",cat:"apparel",def:3,size:1,desc:"Snug, blue, and absurdly clean for the wasteland."},
  leather_armor:{name:"Leather Armor",cat:"apparel",def:12,size:2,desc:"Riveted hide over the shoulders. Smells of old smoke."},
  reinforced_jacket:{name:"Reinforced Trail Jacket",cat:"apparel",def:18,size:2,desc:"Caravan-grade. Plates sewn into the lining."},
  // weapons
  combat_knife:{name:"Combat Knife",cat:"weapon",kind:"melee",dmg:11,size:1,desc:"Standard-issue Vault security blade. Keeps an edge."},
  pistol10mm:{name:"10mm Pistol",cat:"weapon",kind:"gun",dmg:22,ammo:"ammo10mm",size:2,desc:"RobCo sidearm. Reliable. Loud."},
  pipe_rifle:{name:"Pipe Rifle",cat:"weapon",kind:"gun",dmg:17,ammo:"ammo556",size:3,desc:"Wasteland scrap-gun. Ugly, but it shoots."},
  tire_iron:{name:"Tire Iron",cat:"weapon",kind:"melee",dmg:14,size:2,desc:"Heavy enough to argue with a raider."},
  // ammo
  ammo10mm:{name:"10mm Rounds",cat:"ammo",size:0,desc:"Brass and lead. Currency that kills."},
  ammo556:{name:"5.56mm Rounds",cat:"ammo",size:0,desc:"For rifles and bad decisions."},
  // aid
  stimpak:{name:"Stimpak",cat:"aid",size:1,use:{hp:35},desc:"+35 HP. The wasteland's best friend."},
  radaway:{name:"RadAway",cat:"aid",size:1,use:{rads:-40},desc:"-40 RAD. A bag of glowing regret."},
  radx:{name:"Rad-X",cat:"aid",size:1,use:{rads:-15},desc:"-15 RAD. Best taken before the glow, not after."},
  // food
  nukacola:{name:"Nuka-Cola",cat:"food",size:1,use:{hp:12,rads:3},desc:"+12 HP, faint glow. The taste of a dead world."},
  cram:{name:"Cram",cat:"food",size:1,use:{hp:9},desc:"+9 HP. Salt-cured mystery meat in a tin."},
  purified_water:{name:"Purified Water",cat:"food",size:1,use:{hp:18},desc:"+18 HP. Clean water. Worth its weight in caps out here."},
  // packs
  satchel:{name:"Leather Satchel",cat:"pack",capacity:6,size:0,desc:"A dead wanderer's shoulder bag. Six slots."},
  rucksack:{name:"Trail Rucksack",cat:"pack",capacity:12,size:0,desc:"Frame-and-canvas caravan pack. Twelve slots."},
  // act one
  vault_field_pack:{name:"Vault 27 Field Pack",cat:"pack",capacity:6,size:0,desc:"A small issue pack from the vault stores. Six slots — all they could spare."},
  vault_wrench:{name:"Vault 27 Wrench",cat:"weapon",kind:"melee",dmg:13,size:1,desc:"Your wrench. You know its weight better than your own hand."},
  sams_cap:{name:"Dottie's Lucky Cap",cat:"misc",size:0,desc:"A scuffed bottle cap your kid sister pressed into your palm. \"So you remember to come back.\""},
  cass_locket:{name:"Cass's Photo",cat:"misc",size:0,desc:"A cracked photo of the two of you by the hydroponics lights. Worth more than caps."},
};
const SPECIAL_NAMES={S:"STRENGTH",P:"PERCEPTION",E:"ENDURANCE",C:"CHARISMA",I:"INTELLIGENCE",A:"AGILITY",L:"LUCK"};

/* ---------------------- STATE ---------------------- */
let state;
function freshState(){
  return {
    name:"DWELLER",
    hp:100, maxHp:100, rads:0, caps:0,
    sp:{S:4,P:4,E:4,C:4,I:4,A:4,L:4},   // grows through the choices of your last ordinary day
    bonds:{robin:0,cass:0,sam:0},
    dwellerName:"Diego",            // what people in the vault call you (chosen at the morning prompt)
    inv:{}, equippedWeapon:null, wornApparel:null, pack:null,
    flags:{}, log:[],
    history:[],   // read-only journal of the last 5 scenes: {crumb,text,choiceLabel}
  };
}

/* ---------------------- INVENTORY HELPERS ---------------------- */
const has = id => (state.inv[id]||0) > 0;
const capCount = () => state.pack ? ITEMS[state.pack].capacity : 2;
function usedSlots(){
  let n=0;
  for(const id in state.inv){
    if(state.inv[id]<=0 || !ITEMS[id]) continue;
    if(id===state.equippedWeapon||id===state.wornApparel||id===state.pack) continue;
    if(ITEMS[id].cat==="ammo") continue;
    n += ITEMS[id].size * state.inv[id];
  }
  return n;
}
function roomFor(id){ return usedSlots()+ (ITEMS[id].size||0) <= capCount(); }

function addItem(id, qty=1){ state.inv[id]=(state.inv[id]||0)+qty; }
function removeItem(id, qty=1){
  if(!state.inv[id]) return;
  state.inv[id]-=qty;
  if(state.inv[id]<=0){
    delete state.inv[id];
    if(state.equippedWeapon===id) state.equippedWeapon=null;
    if(state.wornApparel===id) state.wornApparel=null;
  }
}
function equipPack(id){
  // transfer to new pack, leave old behind
  if(state.pack && state.pack!==id) removeItem(state.pack);
  state.pack=id; addItem(id,1);
}
function useItem(id){
  const it=ITEMS[id]; if(!it.use) return;
  if(it.use.hp) state.hp=Math.min(state.maxHp, state.hp+it.use.hp);
  if(it.use.rads!=null) state.rads=Math.max(0, Math.min(100, state.rads+it.use.rads));
  removeItem(id,1);
}

/* ---------------------- STORY EFFECT BUILDERS ---------------------- */
const give = (id,q=1)=>()=>addItem(id,q);
const wear = id=>()=>{ addItem(id,1); state.wornApparel=id; };
const arm  = id=>()=>{ addItem(id,1); state.equippedWeapon=id; };
const setPack = id=>()=>equipPack(id);
const hurt = n=>()=>{ state.hp=Math.max(0, state.hp - Math.max(1, n - Math.floor((state.wornApparel?ITEMS[state.wornApparel].def:0)/3))); };
const heal = n=>()=>{ state.hp=Math.min(state.maxHp, state.hp+n); };
const rad  = n=>()=>{ state.rads=Math.min(100, state.rads+n); };
const caps = n=>()=>{ state.caps=Math.max(0, state.caps+n); };
const flag = f=>()=>{ state.flags[f]=true; };
const logIt = (t)=>()=>{ state.log.unshift(t); };
function chain(...fns){ return ()=>fns.forEach(f=>f()); }

/* Act One: shape who you are through what you do */
const sp   = (k,n=1)=>()=>{ state.sp[k]=Math.min(9,(state.sp[k]||0)+n); };
const bond = (who,n=1)=>()=>{ state.bonds[who]=(state.bonds[who]||0)+n; };
const TITLES={S:"THE BRUISER",P:"THE SHARP EYE",E:"THE UNBROKEN",C:"THE SILVER TONGUE",I:"THE TINKERER",A:"THE QUICK HAND",L:"THE LONG SHOT"};
function deriveTitle(){
  let best="I", bestv=-1;
  for(const k of ["S","P","E","C","I","A","L"]){ if(state.sp[k]>bestv){ bestv=state.sp[k]; best=k; } }
  state.name = TITLES[best];
  return state.name;
}
function specialLine(){
  return ["S","P","E","C","I","A","L"].map(k=>`${k} ${state.sp[k]}`).join("  ");
}

const weaponDmg = ()=>{
  const w=state.equippedWeapon; if(!w) return 0;
  const it=ITEMS[w];
  if(it.kind==="gun" && !has(it.ammo)) return Math.floor(it.dmg*0.15); // pistol-whip, basically useless
  return it.dmg;
};
const hasUsableWeapon = ()=> weaponDmg() >= 10;

  crumb:"VAULT 27 · THE DOOR · 21:40",
  text:()=>
`They don't let you go empty-handed, and they don't let you walk to the threshold alone. The vault gathers what it can spare. But the people who matter come with their own gifts, in the corridor before the door, while the painted sky goes dark on its evening cycle overhead.

Dax reaches you first. He's been carrying something heavy in the small of his back since the assembly — three hours now, walking the corridors at your shoulder while you signed the manifests and said the goodbyes, working up to this, because he decided you were going to volunteer before you decided it yourself. He knew. He always knows you first. He shoves it into your chest: a 10mm pistol, a box of rounds. <span class="say">"Lifted it from the security locker. Don't tell Wynn."</span> His grin is doing the work of a structural support. His fingers, for once, are not drumming at all. <span class="say">"You come back, ${state.dwellerName}. You come back, or I swear I will walk out there myself and drag you home and complain the entire way. Don't make me go outside. You know I burn."</span>

Cass presses a clinic bundle into your hands — stimpaks, a bag of RadAway, everything she could justify the loss of — and then, quieter, a cracked photo of the two of you under the grow-lights. <span class="say">"So you remember what you're walking back to."</span> Her hand finds the side of her neck; her voice holds level by force. She doesn't say the promise out loud. She doesn't have to. You both know which sky she means.

Aunt Pia hugs you hard, smelling of the kitchen and the kid-soap she still uses on Dottie's hair, and tells you to mind the dust, it gets in everything, she'll never forget the dust — and then stops, a half-second too long, reaching for a memory that isn't there, before she covers it with a brisk pat to your cheek. Dottie, beside her, fills the gap without seeming to notice she's doing it: *"She means be careful, big."* She's done it before. She doesn't know she does it.

And then Dottie herself, last, very small and very brave, holding her own left wrist with her other hand the way she does. She folds something into your palm: a scuffed bottle cap, the lucky one, the *best* one — you can tell by the way she's been guarding it that she chose it on purpose, that she's been saving it for an emergency she didn't have a name for until two nights ago. <span class="say">"It's the luckiest thing I have,"</span> she says, and her voice only wobbles once. <span class="say">"So you have to bring it back. You have to. That's the rule."</span> She looks up at you. <span class="say">"...Okay, big?"</span>`,

Wynn holds your gaze a moment longer than the handoff needs — that same second sentence behind her eyes from the corridor this morning, the one she's carried so long it's worn smooth. This time she lets a corner of it out. <span class="say">"There's a thing I should have told you years ago, ${state.dwellerName}. A thing about this place. Not now — there's no time, and you couldn't carry it and the walk both."</span> Her jaw sets. <span class="say">"When you come back — and I mean *when*, not if — I want you to make me say it. Promise me you'll make me say it."</span>

Then, softer, the only thing she has left to ask: <span class="say">"You were the best of us at the small repairs. Go fix the biggest one. Find the regulator. And come home."</span>

<span class="ok">[ Your Pip-Boy is online — tap ▸ PIP-BOY to view STAT, your pack (INV), and your journal & the people you carry (DATA). ]</span>`;

door:{
  crumb:"VAULT 27 · THE DOOR · 22:00",
  text:()=>
`You walk to the end of the hall, where the enormous numbered gear waits. Nobody alive has seen it open. Behind you, two hundred people hold their breath; three of them hold something more than that.

Wynn nods to the control booth. The release klaxon sounds. Pistons the size of your leg drive into the rock, and the great door shrieks against two centuries of dust and rolls aside — and for the first time in your life, you feel wind that no machine made, smell air no recycler cleaned.

The tunnel beyond climbs toward a coin of painful white light. Dottie is crying somewhere behind you. Cass is not, by what must be an act of enormous will. Dax says, far too loudly, <span class="say">"See you soon, ${state.dwellerName},"</span> and it almost sounds like a fact.

You step toward the light, and the only world you've ever known stays behind you, counting days.`,
  choices:[
    { key:"1", label:"Walk up the tunnel, into the sky.", to:"threshold" },
  ]
},

threshold:{
  crumb:"THE SALTPAN · VAULT 27 ENTRANCE",
  text:
`The world is enormous. That's the first thing — there is no ceiling, and the sky goes up forever, the color of a bruise healing. You stand blinking in the mouth of a collapsed parking structure while a hot wind drags grit across cracked solar panels. Cass should be here for this. You press a hand to the photo in your pack and keep walking.

The Saltpan stretches below: a white salt flat shimmering to the horizon, broken by the bones of a highway and, far off, a thread of green where something still grows.

Just inside the tunnel mouth, slumped against the wall, is a skeleton in the rotted remains of a Vault 27 jumpsuit — someone who walked out this same door, long ago, and got no farther. A folded note is tucked into the rib cage. There's a stimpak still clipped to the belt, and the dull shape of a tire iron in the dust.

<span class="ok">[ Your field pack holds 6 slots. Heads up — you may not have room for everything. Open ▸ PIP-BOY (INV) to manage your load. ]</span>`,
  loot:[
    { id:"thresh_stim", item:"stimpak", label:"Take the stimpak clipped to the belt." },
    { id:"tireiron_pickup", item:"tire_iron", label:"Take the tire iron (a backup melee weapon)." },
  ],
  choices:[
    { key:"r", label:"Read the folded note.", to:"note" },
    { key:"g", label:"Leave the bones in peace and step into the Saltpan.", to:"saltpan" },
  ]
},

note:{
  crumb:"THE SALTPAN · A NOTE",
  text:
`The paper is brittle as a moth's wing. The hand is shaky, hurried:

<span class="say">"To whoever Wynn sends next — and she will. The pump dies, she sends someone, that's the pattern. I was the someone before you. I didn't make it past the door; the rads up here were worse then. Listen: don't trust the salt. It's beautiful and it'll cook the water right out of you. Make for the green line west — there's a town, Drywell, built on the only good aquifer for fifty miles. The water-boss there is hard but fair. And whatever you do, keep your bag. Out here, what you can carry is who you are. — Sleeper 14, Vault 27."</span>

You fold the note away. Two hundred years of dwellers walking out this door, one at a time. You intend to be the one who walks back in.`,
  effect:chain(flag("readNote"), logIt("A note from <b>Sleeper 14</b> points west to <b>Drywell</b> and its aquifer.")),
  choices:[
    { key:"1", label:"Step into the Saltpan and head west.", to:"saltpan" },
  ]
},

/* -------- FIRST NPC: MARIEL (dialogue heavy) -------- */
saltpan:{
  crumb:"THE SALTPAN · OPEN FLAT",
  text:
`You walk into the white. The salt crunches like old snow, and the heat lies on you like a hand. Your Pip-Boy's geiger counter ticks lazily — survivable, for now.

You're maybe an hour out when you see the other person: a lean woman in a dust-wrapped trail coat leading a two-headed brahmin laden with scrap. She sees you a heartbeat later, and her hand drifts toward the rifle slung at her back — then stops, because she's looking at your jumpsuit and the great blue 27 across your shoulders, and her face does something complicated.

<span class="say">"Huh,"</span> she says, when you're close enough. <span class="say">"A vaultie. A real, actual, factory-fresh vaultie. Thought you people were a campfire story."</span> The brahmin lows at you with both heads. <span class="say">"Name's Mariel. You're either very lost or very new. Which is it?"</span>`,
  choices:[
    { key:"1", label:"\"New. The door opened this morning. I have questions.\"", to:"mariel_talk" },
    { key:"2", label:"[PER 6] You notice she's favoring one leg, and the blood on her coat.",
      to:"mariel_wound", check:{stat:"P",dc:6} },
    { key:"3", label:"\"Stay back. I don't know you.\" (Hand on your weapon.)", to:"mariel_wary" },
  ]
},

mariel_wound:{
  crumb:"THE SALTPAN · MARIEL",
  text:
`You keep your tone easy, but your eyes go to the dark stain spreading along her left thigh, and the careful way she's holding her weight.

<span class="say">"You're hurt,"</span> you say.

Mariel's eyebrows go up. <span class="say">"...Sharp eye for a tin-can tourist."</span> She exhales, and some of the wariness goes out of her with it. <span class="say">"Raiders. Rust-runners, two ridges back. Caught me a graze and most of my caravan. I'm the part that got away."</span> She studies you with new interest. <span class="say">"You that observant about everything, or just bleeding strangers?"</span>`,
  effect:flag("mariel_trust"),
  choices:[
    { key:"1", label:"Offer her a Stimpak.", to:"mariel_heal", need:{item:"stimpak"},
      lockedLabel:"Offer her a Stimpak you don't have." },
    { key:"2", label:"\"Just you. Tell me where I am, and I'll watch your back to town.\"", to:"mariel_talk" },
  ]
},

mariel_heal:{
  crumb:"THE SALTPAN · MARIEL",
  text:
`You dig a Stimpak from your bag and hold it out. <span class="say">"Here. For the leg."</span>

Mariel stares at it like you've offered her a fistful of pre-war gold — which, out here, is roughly the trade. Then she takes it, jabs it into her thigh with practiced violence, and lets out a long breath as the bleeding stops.

<span class="say">"Okay,"</span> she says quietly. <span class="say">"Okay. A vaultie who gives away stims to strangers. The wasteland's gonna eat you alive, friend — unless somebody decent gets to you first."</span> She straightens, testing the leg. <span class="say">"Tell you what. You're going to Drywell, I can tell. Everybody's going to Drywell. Walk with me, and I'll make sure you get there in one piece — and I'll trade you up to a real pack. That field pack of yours won't hold a day's salvage."</span>`,
  effect:chain(()=>removeItem("stimpak",1), flag("mariel_ally"),
    logIt("Healed <b>Mariel</b>, a caravan scout. She's offered to guide you to Drywell and trade you a better pack.")),
  choices:[
    { key:"1", label:"\"A better pack? Let's see it.\"", to:"mariel_pack" },
  ]
},

mariel_pack:{
  crumb:"THE SALTPAN · MARIEL",
  text:
`Mariel unstraps a frame rucksack from the brahmin's load and tosses it to you. <span class="say">"Trail rucksack. Twelve slots, good harness, only smells a little like brahmin. It's yours — call it a finder's fee for the leg."</span> She nods at your field pack. <span class="say">"Move your kit over. Leave the little vault bag, somebody'll want it."</span>

You transfer everything across. The rucksack rides higher and easier; suddenly the wasteland feels a fraction less like it's trying to strip you bare.`,
  effect:chain(setPack("rucksack"), flag("hasRuck"), logIt("Mariel gave you a <b>Trail Rucksack</b> (12 slots)."), ()=>toast("UPGRADED · TRAIL RUCKSACK")),
  choices:[
    { key:"1", label:"\"Thank you. Now — where exactly am I?\"", to:"mariel_talk" },
  ]
},

mariel_wary:{
  crumb:"THE SALTPAN · MARIEL",
  text:
`Your hand settles on your weapon. Mariel notices, and the warmth drains from her face like water through salt.

<span class="say">"Easy, vaultie,"</span> she says flatly, backing her brahmin up a step. <span class="say">"I've put down three things today already and I'd rather you not be the fourth. You want to be jumpy? Fine. Be jumpy somewhere else."</span>

She gives you a wide berth, eyeing you the whole way, and points west with her chin before she goes. <span class="say">"Town's that way. Drywell. They don't much like people who draw on strangers, so practice your manners before you get there."</span> Then she's gone, swallowed by the heat-shimmer, and you've learned your first lesson of the surface: trust is the only currency that buys trust.`,
  effect:logIt("Spooked <b>Mariel</b>, a caravan scout. She pointed you to Drywell and left."),
  choices:[
    { key:"1", label:"Head west toward Drywell, alone.", to:"crank" },
  ]
},

mariel_talk:{
  crumb:"THE SALTPAN · MARIEL",
  text:
`<span class="say">"Where you are,"</span> Mariel repeats, almost gently. <span class="say">"You're in the Saltpan, edge of the Mojave, year of somebody's lord two-eighty-four. The old world ended a couple centuries back — bombs, the long winter, all of it. What's left is us, scratching a living off the bones."</span>

She points west, to that distant thread of green. <span class="say">"Drywell's that way. Only working aquifer for fifty miles, which makes the water-boss there the closest thing to a king the Saltpan's got. NCR flag flies over the gate but everybody knows it's Saul Drywell who runs the taps. If your Vault needs water-tech, Drywell's where the wasteland keeps its smart people — Brotherhood scribes, traders, a doctor who talks to ghosts. Start there."</span>

She squints at you. <span class="say">"What's a vaultie need bad enough to walk out a sealed door for, anyhow?"</span>`,
  choices:[
    { key:"1", label:"[CHA 6] Tell her the truth and ask her to vouch for you in Drywell.",
      to:"mariel_vouch", check:{stat:"C",dc:6} },
    { key:"2", label:"[INT 6] \"Our aquifer pump's failed. I need a reclamation regulator or an engineer.\"",
      to:"mariel_tech", check:{stat:"I",dc:6} },
    { key:"3", label:"\"Just passing through. Thanks for the directions.\"", to:"crank" },
  ]
},

mariel_vouch:{
  crumb:"THE SALTPAN · MARIEL",
  text:
`You tell her straight: two hundred souls, ninety days of water, a dead pump and a sealed door behind you. No theatrics. Just the truth, and the weight of it.

Mariel is quiet a moment. <span class="say">"Two hundred people,"</span> she says. <span class="say">"Hell."</span> She works something out behind her eyes, then nods. <span class="say">"Right. Saul Drywell doesn't trust strangers, and he trusts vaulties even less — last vault that opened near here flooded the Saltpan with crazies. But he trusts me. I run scrap for him."</span>

She pulls a brass token from her coat and presses it into your palm. <span class="say">"Show him this at the gate. Tell Tess at the bar that Mariel sent you and you're good for it. That buys you a hearing, not a miracle. The rest is on you and that silver tongue."</span>`,
  effect:chain(flag("mariel_token"), give("nukacola",1),
    logIt("<b>Mariel</b> gave you her brass token — show it to Saul Drywell to earn a hearing.")),
  choices:[
    { key:"1", label:"Pocket the token and head for Drywell.", to:"crank" },
  ]
},

mariel_tech:{
  crumb:"THE SALTPAN · MARIEL",
  text:
`<span class="say">"A reclamation regulator,"</span> you say. <span class="say">"Pre-war RobCo part, or a scribe who can fabricate one. Without it, two hundred people in my Vault die of thirst inside three months."</span>

Mariel blinks. <span class="say">"You actually know what's broken. That's rarer than the part, believe me."</span> She rubs her jaw. <span class="say">"RobCo water-tech... there's a Brotherhood scribe holed up in Drywell, name of Aldous, collects exactly that kind of junk. He won't give you anything — Brotherhood never does — but he'll know where one is. And the Brotherhood loves a vault that still has working pre-war tech inside it. You've got something to trade he can't resist: a peek at your home."</span>

She looks almost impressed. <span class="say">"Lead with that, with Aldous. Not the sob story — the tech."</span>`,

    logIt("Learned of <b>Scribe Aldous</b> in Drywell — Brotherhood, hoards water-tech, will deal for a look at Vault 27.")),

  ]

crank:{
  crumb:"THE SALTPAN · OLD HIGHWAY",
  text:
`The salt gives way to the cracked spine of an old highway, and the green line resolves into distant scrub. As the sun drops, you find a small fire burning under a collapsed overpass — and beside it, a figure that makes your Pip-Boy tick faster.

He's a ghoul: skin like cracked leather over a skull, no nose to speak of, eyes a milky gold. Two centuries of radiation have eaten most of what he was, but not the man behind it. He's roasting something on a wire and doesn't reach for the hunting rifle leaning beside him.

<span class="say">"Sit if you're sitting,"</span> he rasps without looking up. <span class="say">"Don't shoot if you're not shooting. I'm too old to do either standing."</span> A milky eye rolls toward your jumpsuit. <span class="say">"Vault 27. Knew a girl from 27 once, back when the lights were new. You lot still keeping the fountain in the atrium?"</span>`,
  choices:[
    { key:"1", label:"\"You remember the Vault? How old ARE you?\"", to:"crank_old" },
    { key:"2", label:"[INT 7] Ask him what he knows about pre-war water reclamation tech.",
      to:"crank_tech", check:{stat:"I",dc:7} },
    { key:"3", label:"[CHA 5] Share your fire and your story, traveler to traveler.",
      to:"crank_share", check:{stat:"C",dc:5} },

  ]
},

crank_old:{
  crumb:"THE SALTPAN · OLD CRANK",
  text:
`The ghoul wheezes a laugh that turns into a cough. <span class="say">"Old enough to have paid taxes to a country nobody remembers. Name's Crank — used to be a longer name, but the years sanded it down."</span> He turns the wire over the flame. <span class="say">"I was a lineman. Strung the power out to your Vault before they sealed it, matter of fact. Then the bombs fell, and I caught a lifetime of rads instead of a quick death, and here I still am. Lucky me."</span>

He says it without much bitterness. Just fact, the way the wasteland deals in facts.

<span class="say">"You're walking to Drywell. Everyone is. Word of advice from a dead man who won't stay dead: there's a raider checkpoint where this highway pinches through the rocks, mile ahead. The Rust-runners. They tax the road in caps, cargo, or blood, and they're not particular which."</span>`,
  effect:chain(flag("warned_raiders"), logIt("<b>Crank</b>, an old ghoul lineman, warned of a Rust-runner checkpoint ahead on the highway.")),

    { key:"1", label:"[CHA 5] \"Anything I can do to get past them without a fight?\"",
      to:"crank_share", check:{stat:"C",dc:5} },

  ]
},

crank_tech:{
  crumb:"THE SALTPAN · OLD CRANK",
  text:
`You crouch by the fire and ask him plainly about reclamation regulators — flow rates, the RobCo aquifer schematics, the failure modes of a two-century-old pump.

Crank's milky eyes sharpen. <span class="say">"Now that's a question with some meat on it. Most folk out here can't spell 'aquifer,' let alone fix one."</span> He scratches at his jaw with a leathery finger. <span class="say">"Your regulator — RobCo Hydraulics, model line they used in all the deep Vaults. They went bad in batches; the ceramic seals were garbage. You won't scavenge a good one off the salt. But the Brotherhood's been pulling them out of a flooded RobCo facility east of Drywell for years. Scribe in town, Aldous, has a whole crate of 'em. Question is what he wants in trade."</span>

He fishes two tablets from a tin and flicks them to you. <span class="say">"Rad-X. Facility's hot as a reactor's lunch. You'll want these if you ever go digging there yourself."</span>`,
  effect:chain(flag("knows_aldous"), flag("knows_facility"), give("radx",2),

crank_share:{
  crumb:"THE SALTPAN · OLD CRANK",
  text:
`You sit, and you talk. You tell him about the alarm, the dry fountain, Wynn's tired eyes, the door opening onto a world too big to hold in your head. Crank listens the way only the very old can — without hurry, without judgment.

<span class="say">"First day out of the dark,"</span> he murmurs. <span class="say">"I remember mine. Worst and best day of a long, long life."</span> He pulls the wire off the fire and offers you half of whatever it is. It's mole rat, and it's the best thing you've ever eaten, which tells you something about Vault food.

<span class="say">"For the road,"</span> he says, and presses a bottle of clean water and a tip into your hands. <span class="say">"Those Rust-runners at the pinch — their boss is a coward who plays at being a king. He respects two things: a full purse and a steady spine. Don't run, don't beg. Stand square, look bored, and offer him a toll he can save face taking. Costs you a few caps. Beats costing you your blood."</span>`,
  effect:chain(flag("crank_advice"), give("purified_water",1), heal(6),
    logIt("Shared a meal with <b>Crank</b>. His tip: the Rust-runner boss respects a steady spine — offer a face-saving toll, don't beg.")),

/* -------- RAIDER CHOKEPOINT (multi-resolution, dialogue-forward) -------- */
chokepoint:{
  crumb:"THE SALTPAN · THE PINCH",
  text:
`The highway funnels into a slot between two leaning rock walls, and the Rust-runners have made it theirs. A barricade of welded car-doors blocks the road. Spray-painted across it, a crude crown dripping rust-red.

Three of them lounge in the shade, and a fourth — broad, scarred, wearing a road-sign as a breastplate — pushes off the rock and saunders into your path with the bored swagger of a man who's done this a thousand times.

<span class="say">"Road's closed, traveler,"</span> he drawls, <span class="say">"less you pay the Rust toll. Caps, cargo, or a pint of you — King's choice, and I'm feeling thirsty."</span> Behind him, a woman racks a pipe rifle, slow and theatrical. <span class="say">"So. What've you got for your king today?"</span>`,
  choices:[
    { key:"1", label:"[CHA 7] Talk past him — offer a small, face-saving toll.",
      to:"choke_talk", check:{stat:"C",dc:7} },
    { key:"2", label:"[STR 6] Stand square and stare him down. \"Try it.\"",
      to:"choke_intimidate", check:{stat:"S",dc:6} },
    { key:"3", label:"Pay the toll in caps. (25 caps)", to:"choke_pay", need:{caps:25},
      lockedLabel:"Pay the toll — you're short on caps." },
    { key:"4", label:"[AGI 6] Slip off the road and sneak past through the rocks.",
      to:"choke_sneak", check:{stat:"A",dc:6} },
    { key:"5", label:"Draw your weapon and fight your way through.",
      to:()=>hasUsableWeapon()?"choke_win":"choke_loss" },
  ]
},

choke_talk:{
  crumb:"THE PINCH · TOLL PAID IN WORDS",
  text:
`You don't reach for caps and you don't reach for a weapon. You smile, like a man greeting a colleague.

<span class="say">"A king deserves tribute,"</span> you say, easy as anything, and flip him a handful of caps before he can name a price — just enough to look generous, little enough to keep. <span class="say">"For the crown. We're square, your majesty. I'll tell the road the Rust toll's fair and the King's a reasonable man."</span>

The big raider catches the caps, and you watch him weigh the math: a fight, or a story that makes him sound like the wise lord he pretends to be. Vanity wins, the way Crank said it would.

<span class="say">"...Damn right I'm reasonable,"</span> he announces to his crew, pocketing the caps. <span class="say">"Road's yours, traveler. Tell 'em the King let you pass."</span> He waves the barricade open. You walk through it with your spine straight and your skin intact.`,
  effect:chain(caps(-15), flag("passed_choke"), logIt("Talked past the <b>Rust-runner</b> checkpoint with a face-saving toll.")),
  choices:[ { key:"1", label:"Continue down the highway to Drywell.", to:"drywell" } ]
},

choke_intimidate:{
  crumb:"THE PINCH · STAREDOWN",
  text:
`You don't move, don't blink, don't reach for anything. You let your shoulders settle and you look at him like he's a chore.

<span class="say">"Try it,"</span> you say, and let the silence do the rest.

It's not the words. It's that you mean them. The big raider's grin flickers. He'd planned on a frightened traveler, and instead he's got a wall in a Vault suit who looks like he's killed before and found it dull. His crew shifts. A leader who picks a fight he might lose stops being a leader.

<span class="say">"...Ahh, you're not worth the bullets,"</span> he says finally, too loud, covering. <span class="say">"Get gone. Road's free today. King's mercy."</span> He spits and turns away. You walk through the gap slow enough to make the point, and not one of them meets your eyes.`,
  effect:chain(flag("passed_choke"), logIt("Stared down the <b>Rust-runner</b> boss and walked through untouched.")),
  choices:[ { key:"1", label:"Continue down the highway to Drywell.", to:"drywell" } ]
},

drywell:{
  crumb:"DRYWELL · TOWN GATE",
  text:
`The green line was true: Drywell is a real town, walled in stacked car-husks and corrugated steel, built in a tight ring around a hand-pump well that actually, miraculously, gives water. A faded NCR flag snaps over the gate, but everyone moving through it answers to the broad man on the well platform who watches the whole town like a hawk watches a field.

A gate guard with a tired face and a hunting rifle looks you up and down — Vault suit, Pip-Boy, no obvious malice. <span class="say">"Huh. A vaultie. Don't get many of those that aren't trouble."</span> She thumbs over her shoulder. <span class="say">"Bar's the building with the lantern. Trader's the one with the junk piled out front. And if you've got business with the boss — that's Saul Drywell, up on the well — you go through Tess at the bar first. Nobody talks to Saul cold."</span>`,
  effect:flag("at_drywell"),
  choices:[
    { key:"1", label:"Go to the bar and find Tess.", to:"bar" },
    { key:"2", label:"Visit the trader's stall first.", to:"trader" },
    { key:"3", label:"[INT 6] Ask the guard about a Brotherhood scribe named Aldous.",
      to:"guard_aldous", check:{stat:"I",dc:6} },
  ]
},

guard_aldous:{
  crumb:"DRYWELL · TOWN GATE",
  text:
`<span class="say">"Aldous?"</span> The guard snorts. <span class="say">"Yeah, the Brotherhood's pet scribe. Keeps to the old water-tower on the east wall, surrounded by more humming junk than the rest of us own put together. Tin-can fanatics, the Brotherhood — they'd let you die of thirst standing on a working purifier if it meant keeping the 'technology' out of dirty hands."</span>

She shrugs. <span class="say">"That said — if it's pre-war water-tech you want, Aldous is the only game in the Saltpan. Just don't expect charity. Brotherhood deals in trade, and what they want is always tech for tech. You're a vaultie. You're walking around in exactly what he covets."</span>`,
  effect:chain(flag("knows_aldous"), logIt("The gate guard confirmed <b>Scribe Aldous</b> is in the east water-tower and deals tech-for-tech only.")),
  choices:[
    { key:"1", label:"Head to the bar to find Tess.", to:"bar" },

  ]
},

bar:{
  crumb:"DRYWELL · THE DRY WELL SALOON",
  text:
`The saloon is dim and cool and smells of dust, hops, and brahmin fat. A handful of locals nurse drinks. Behind the bar, a wiry woman with grey-streaked braids and forearms like rebar polishes a glass and clocks you the instant you duck through the door.

<span class="say">"Vault suit,"</span> Tess says, not unkindly. <span class="say">"Either you're here to drink, here to cause trouble, or here to see Saul. You don't look thirsty and you don't look stupid, so."</span> She sets the glass down. <span class="say">"What do you want, dweller?"</span>`,

tess_token:{
  crumb:"DRYWELL · TESS",
  text:
`You set Mariel's brass token on the bar. Tess picks it up, turns it over, and her whole posture changes.

<span class="say">"Mariel's mark. Well, hell — why didn't you lead with that."</span> She slides it back. <span class="say">"Mariel doesn't vouch for fools or vaultie crazies, so that's you cleared the first hurdle most folk never get over. She alright? She's overdue."</span> You tell her about the raiders and the leg; Tess's jaw tightens. <span class="say">"Rust-runners. Saul keeps saying he'll deal with 'em. Anyway — you're good in here. I'll send word up to the well that you're worth ten minutes of Saul's time. Use 'em well; he doesn't give twenty."</span>`,
  effect:chain(flag("tess_ally"), logIt("<b>Tess</b> recognized Mariel's token and will get you a hearing with Saul Drywell.")),
  choices:[

tess_plea:{
  crumb:"DRYWELL · TESS",
  text:
`You lean on the bar and lay it down with quiet weight: two hundred people, ninety days of water, a dead pump, a sealed door, and a Vault that has kept faith with the surface for two centuries by asking it for nothing — until now.

Tess studies you for a long moment. The saloon has gone a little quiet.

<span class="say">"...You believe every word of that,"</span> she says finally. <span class="say">"That's rarer than water, dweller. Alright. I'll get you in front of Saul. But fair warning — the man's heart pumps caps, not charity. You'll need to make thirst his problem too, or give him something he wants. Think on that before you climb that platform."</span>`,
  effect:chain(flag("tess_ally"), logIt("Moved <b>Tess</b> with the truth; she'll arrange a hearing with Saul Drywell.")),
  choices:[
    { key:"1", label:"\"So what does Saul want? Brief me.\"", to:"tess_brief" },
  ]
},

tess_price:{
  crumb:"DRYWELL · TESS",
  text:
`<span class="say">"The price of a word with Saul,"</span> Tess repeats, amused. <span class="say">"Depends who's asking. For most strangers it's 'no.' For you—"</span> she taps the bar. <span class="say">"Tell you what. Saul's got a problem with the Rust-runners choking his trade road, and a bigger problem he doesn't talk about: his own well's flow is dropping. Town's scared. A vaultie who knows water-tech might be useful enough to be worth ten minutes."</span>

She pours you a drink you didn't order. <span class="say">"On the house. Drink it, then go see the trader Peck — get yourself looking less like fresh meat — and I'll have word sent up to the well. Don't make me regret the drink."</span>`,
  effect:chain(flag("tess_ally"), flag("well_failing"), heal(5),
    logIt("<b>Tess</b> will arrange a hearing. Drywell's own well is quietly failing — Saul needs water-tech help too.")),

tess_brief:{
  crumb:"DRYWELL · TESS",
  text:
`Tess leans in, voice low. <span class="say">"Three things. One: Saul respects competence and despises begging — walk up there like you're doing him a favor, because you might be. Two: his well's flow is dropping and it's terrifying him, though he'd sooner eat sand than admit it in front of the town. And three—"</span>

/* -------- ALDOUS (Brotherhood scribe — tech-for-tech) -------- */
aldous:{
  crumb:"DRYWELL · EAST WATER-TOWER",
  text:
`The east tower hums. Salvaged terminals blink in the gloom, and the air smells of ozone and machine oil. A thin man in the grey hood of a Brotherhood scribe looks up from a workbench, eyes magnified huge behind cracked goggles.

<span class="say">"You're not local,"</span> Scribe Aldous says, in the clipped way of a man who'd rather talk to a circuit board. <span class="say">"Vault-Tec jumpsuit, intact Pip-Boy 3000, no rad-scarring — you came out of a sealed vault, and recently."</span> He sets down a soldering iron. <span class="say">"State your business, dweller. I warn you: the Brotherhood does not give. We acquire, we preserve, we trade. We do not give."</span>`,
  choices:[
    { key:"1", label:"[INT 6] Offer a full survey of Vault 27's intact pre-war systems for a regulator.",
      to:"aldous_deal", check:{stat:"I",dc:6} },
    { key:"2", label:"\"I need a RobCo reclamation regulator. Name your price.\"", to:"aldous_price" },

},

aldous_plea:{
  crumb:"DRYWELL · ALDOUS",
  text:
`<span class="say">"Thirst,"</span> Aldous says, as if testing an unfamiliar word. <span class="say">"People die of thirst across this whole wasteland, dweller, every single day, and the Brotherhood does not ride out to each deathbed with a canteen. We are not a charity. We are the last hand keeping humanity's tools out of the fire."</span>

He turns back to his bench. <span class="say">"If you want me to part with a regulator, give me a reason that serves the Brotherhood's mission — not your conscience. Technology for technology. That is the only language I trade in."</span> A pause. <span class="say">"You came out of an intact vault. Think harder about what you're standing in before you waste my time with feelings."</span>`,
  choices:[
    { key:"1", label:"[INT 6] \"Then trade tech for tech: a full survey of Vault 27's systems.\"",

aldous_price:{
  crumb:"DRYWELL · ALDOUS",
  text:
`Aldous actually laughs, a dry rustle. <span class="say">"Caps? I have no use for caps. A working deep-vault regulator is one of perhaps four in the entire Mojave, and you want to buy it like a bottle of Nuka-Cola."</span>

He folds his arms. <span class="say">"There is exactly one thing you possess that the Brotherhood values more than the regulator: knowledge of an intact Vault-Tec installation. Vault 27's reactor, its purification array, its mainframe — all of it pristine, untouched, exactly as the Enclave's grandfathers left it. Grant the Brotherhood survey access — let me catalogue what's down there — and a regulator is yours. That is the deal. There is no other."</span>`,
  choices:[
    { key:"1", label:"[INT 6] Negotiate the survey terms to protect your people first.",
      to:"aldous_deal", check:{stat:"I",dc:6} },
    { key:"2", label:"Agree to the survey, plainly. \"Catalogue it. Just give me the part.\"", to:"aldous_simple" },
    { key:"3", label:"\"I won't hand my home to the Brotherhood sight unseen.\" (Refuse.)", to:"aldous_refuse" },
  ]
},

aldous_deal:{
  crumb:"DRYWELL · ALDOUS · TERMS",
  text:
`You don't flinch, and you don't gush. You talk like an engineer to an engineer: survey access, yes — but documented, supervised, no removal of core systems, and Vault 27's people stay sovereign over their own door. In exchange: the regulator now, plus Aldous's word, witnessed, that the Brotherhood treats Vault 27 as a partner, not a salvage site.

Aldous's magnified eyes narrow, then — grudgingly — warm. <span class="say">"You think like one of us. That's almost insulting."</span> He pulls a sealed crate from beneath the bench and lifts out a regulator: ceramic-and-steel, RobCo-stamped, immaculate. <span class="say">"Terms accepted, dweller. The Brotherhood honors a sharp negotiator more than a desperate one."</span>

He places it in your hands. It's heavier than it looks, and it's two hundred lives.`,
  effect:chain(flag("has_regulator"), flag("aldous_partner"),
    logIt("<b>Negotiated</b> with Scribe Aldous: regulator now, supervised survey later, Vault 27 stays sovereign. You're carrying the part home.")),
  choices:[

      hideUnless:"knows_regulators" },
    { key:"2", label:"Take the regulator and start the long walk home.", to:"ending_hub" },

},

Aldous nods once and produces the regulator without ceremony. <span class="say">"Wise. A vault that shares its knowledge survives; a vault that hoards it becomes a tomb we excavate later anyway."</span> The crate clicks shut. <span class="say">"My team will follow you to Vault 27 within the season. See that the door is open."</span>

It's done. You have the part — and you've promised the Brotherhood a key to your home. Wynn will have opinions. But Wynn isn't the one out here with two hundred lives going dry, and the regulator is real in your hands.`,

aldous_refuse:{

  text:

Aldous regards you a long moment, and to your surprise there's something like respect in it. <span class="say">"Loyalty. Foolish, here, but I won't pretend I don't understand it."</span> He puts the crate away. <span class="say">"Then we have no deal — today. The regulator stays. When your people are three days from the end and you reconsider, the offer will stand. The Brotherhood is patient. Thirst is not."</span>

/* -------- SAUL (water-boss) -------- */
saul:{
  crumb:"DRYWELL · THE WELL PLATFORM",
  text: ()=> (state.flags.tess_ally)
    ? `Tess's word has gone ahead of you. The guard at the foot of the ladder waves you up.

Saul Drywell is broad, sun-cured, and still as a man who's learned that stillness reads as power. He runs the town from a chair beside the well-head, one hand always resting on the pump as if he could feel the water through the steel.

<span class="say">"Tess says you're worth ten minutes,"</span> he says, without turning. <span class="say">"She's stingy with that. So. A vaultie who knows water. My well's flow has dropped a fifth in two months and my engineer's a drunk. Tell me you're not just another mouth, dweller. Tell me what you see."</span>`
    : `You climb the ladder uninvited, and the guard's rifle tracks you the whole way. Saul Drywell doesn't rise from his chair beside the well-head.

<span class="say">"I don't know you,"</span> he says, flat. <span class="say">"And men I don't know don't get ten minutes on my platform. You've got thirty seconds. Spend 'em telling me why a vaultie is worth my time before Wick here walks you back down the hard way."</span>`,

saul_fix:{
  crumb:"DRYWELL · SAUL",
  text:
`You walk to the well-head, listen to the pump's rhythm, watch the gauge needle stutter, and lay a hand on the casing the way he does. Then you tell him: it's not the aquifer drying — it's the intake screen silting up downhole, choking the draw. Old RobCo deep-pumps all do it. Clear it, fit a proper reclamation regulator to stop the back-pressure, and his flow comes back inside a week.

For the first time, Saul turns and looks at you like you're a person and not a problem.

<span class="say">"...Huh,"</span> he says. <span class="say">"My drunk engineer's been blaming the gods for two months and you read it cold in thirty seconds."</span> He stands, joints cracking. <span class="say">"Alright, dweller. You've got my attention and my respect, and those don't come cheap. What do you want?"</span>`,
  effect:chain(flag("saul_respect"), logIt("Diagnosed Drywell's failing well for Saul — silted intake, needs a regulator. Earned his respect.")),

  ]
},

saul_offer:{
  crumb:"DRYWELL · SAUL",
  text:
`You lay your cards down: Vault 27, the dead pump, the regulator you've come a long way to find. And you make the trade plain — your engineering for his help, his weight in this town for your part.

Saul drums his fingers on the pump. <span class="say">"You want the same regulator I want. The Brotherhood scribe's got a crate of 'em and won't sell to me — old grudge, he thinks I'm a warlord with a well."</span> He grunts. <span class="say">"But he might deal with a vaultie. You go up that east tower and you get Aldous to part with two — one for your hole in the ground, one for my well — and I'll send you home with an armed escort, a brahmin of supplies, and the standing friendship of the only water in fifty miles. That's the offer. Don't come back down empty."</span>`,

/* -------- THE BROKER (best path: save both) -------- */
broker:{
  crumb:"DRYWELL · BROKERING THE WATER",
  text:
`This is the thing you can do that no raider's gun and no scribe's dogma can: you can make two stubborn men need each other.

You carry Saul's problem to Aldous and Aldous's price to Saul, and back again, all afternoon — until the shape of a deal stands up. Aldous gets his survey of Vault 27 and, sweeter still, gets to plant the Brotherhood's flag as the power that fixed Drywell's well, NCR banner be damned. Saul gets his flow back and a regulator besides. Vault 27 gets the part that keeps two hundred people breathing. Everybody gives a little. Nobody bleeds.

When it's done, Aldous hands you two regulators in a padded crate, and something close to a smile. <span class="say">"You'd have made a fine scribe, dweller. You made men trade who'd sooner have fought."</span> Down at the well, Saul clasps your forearm like an equal. <span class="say">"Drywell remembers its friends. You ever need water, a gun, or a roof — you've got all three here. Now go home. Your people have waited two centuries; don't make 'em wait on you."</span>`,

/* ---- ending texts ---- */
function endHero(){ return (
`You walk out of Drywell at dusk with two regulators on a borrowed brahmin, an NCR escort Saul shamed into lending you, and Mariel riding point because she "wasn't doing anything anyway."

Behind you, the well of Drywell runs full for the first time in months, and a Brotherhood scribe is already drafting the survey that will, in its careful tin-can way, treat your home as a partner instead of a prize. Ahead, across the darkening Saltpan, a sealed door waits in a collapsed parking structure — and behind it, three faces among two hundred. Dax, who swore to come drag you home. Cass, waiting under a painted sky for the real one you promised her. Dottie, counting days, holding the place where a lucky bottle cap used to be.

You take out that scuffed cap, turn it over in the red light, and put it away again. The rule is you bring it back. You intend to keep the rule — and to bring back the water, the world, and yourself.

<span class="ok">— END OF CHAPTER ONE: THE LONG WALK HOME —</span>
The grand bargain. Vault 27 and Drywell both live, the Brotherhood owes you a favor, and everyone you love is still on the far side of that door, waiting. The walk home is the next chapter.`); }
